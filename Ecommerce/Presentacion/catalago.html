<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario - Ecommerce</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header class="barra-superior">
        <div class="header-left">
            <img src="../imgs/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text">Ecommerce</span>
        </div>
        <div class="header-right">
            <a href="#perfil" class="icon" title="Perfil"><img src="../imgs/perfil.png" alt="Perfil"></a>
            <a href="#cerrar-sesion" class="icon" title="Cerrar sesión"><img src="../imgs/salir.png"
                    alt="Cerrar sesión"></a>
        </div>
    </header>

    <div class="container">
        <aside class="menu-lateral">
            <nav>
                <ul>
                    <li>
                        <div class="menu-item">
                            <img src="../imgs/inicio.png" alt="Inicio" class="menu-icon">
                            <a href="#inicio">Inicio</a>
                        </div>
                    </li>
                    <li>
                        <div class="menu-item">
                            <img src="../imgs/catalogo.png" alt="Catálogo de productos" class="menu-icon">
                            <a href="#catalogo">Catálogo de productos</a>
                        </div>
                    </li>
                    <li>
                        <div class="menu-item">
                            <img src="../imgs/carrito.png" alt="Carrito de compras" class="menu-icon">
                            <a href="carritoCompras.html">Carrito de compras</a>
                        </div>
                    </li>
                    <li>
                        <div class="menu-item">
                            <img src="../imgs/pedidos.png" alt="Gestión de pedidos" class="menu-icon">
                            <a href="#pedidos">Gestión de pedidos</a>
                        </div>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="contenido pantalla-centrada">
            <div class="contenedor-catalago">
                <div class="tarjeta-catalago">
                    
                    <div class="cabecera-catalago">
                        <h2>Catalago</h2>
                    </div>
                    
                    <form class="formulario-catalago">
                        
                        <div class="grupo-formulario">
                            <label for="nombre">Nombre Producto</label>
                            <input type="text" id="nombre" placeholder="Buscar producto">
                        </div>

                        <div class="grupo-formulario">
                            <label for="menor_que">Menor que</label>
                            <input type="radio" id="menor_que" >
                            
                        </div>
                        <div class="grupo-formulario">
                            <label for="mayor_que">Mayor que</label>
                            <input type="radio" id="mayor_que" >

                        </div>
                        <div class="grupo-formulario">
                            <input type="text" id="mayor_que" >
                        </div>
                         <div class="grupo-formulario">
                            <input type="button" id="mayor_que" value="aplicar efecto" >
                        </div>


                    </form>
                </div>
            </div>
            <div class = "contenedor-centrado-tabla">
                <div class ="contenedor-tabla">
                    <div class= "tarjeta-catalago">
                        <table class = "tabla-producto">
                            <tr>
                                <th>imagen</th>
                                <th>nombre</th>
                                <th>precio</th>
                                <th>detalles</th>
                                <th>acciones</th>
                            </tr>
                            <tr>
                              

                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="pie-pagina">
        <p>Aplicaciones Web – Unidad 2</p>
    </footer>
</body>

</html>
